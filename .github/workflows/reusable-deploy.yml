name: Reusable Deploy

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_account:
        type: string
        default: "pdf-automation-sa@pdf-automation-487602.iam.gserviceaccount.com"
      cloud_run_flags:
        type: string
        default: ""
      health_endpoint:
        type: string
        default: "/health"
      enable_preview:
        type: boolean
        default: false
      env_vars:
        type: string
        default: ""
        description: "Cloud Run環境変数（deploy-cloudrunのenv_vars形式）"
      skip_smoke_test:
        type: boolean
        default: false
      authenticated_smoke_test:
        description: 'Use authenticated curl for smoke test (for --no-allow-unauthenticated services)'
        required: false
        type: boolean
        default: false
    secrets:
      cloud_run_secrets:
        required: false
        description: "Cloud Runシークレット（deploy-cloudrunのsecrets形式）"

env:
  PROJECT_ID: pdf-automation-487602
  REGION: asia-northeast1

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/29391431111/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: ${{ inputs.service_account }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ inputs.service_name }}
          region: ${{ env.REGION }}
          source: .
          flags: ${{ inputs.cloud_run_flags }}
          env_vars: ${{ inputs.env_vars }}
          secrets: ${{ secrets.cloud_run_secrets }}

      - name: Get ID Token for Smoke Test
        if: ${{ !inputs.skip_smoke_test && inputs.authenticated_smoke_test }}
        id: id_token
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/29391431111/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: ${{ inputs.service_account }}
          token_format: id_token
          id_token_audience: ${{ steps.deploy.outputs.url }}
          id_token_include_email: true

      - name: Smoke Test
        if: ${{ !inputs.skip_smoke_test }}
        run: |
          URL="${{ steps.deploy.outputs.url }}${{ inputs.health_endpoint }}"
          AUTH_HEADER=""
          if [ "${{ inputs.authenticated_smoke_test }}" = "true" ]; then
            AUTH_HEADER="-H \"Authorization: Bearer ${{ steps.id_token.outputs.id_token }}\""
          fi
          for i in 1 2 3; do
            sleep 10
            STATUS=$(eval curl -s -o /dev/null -w "%{http_code}" --max-time 10 $AUTH_HEADER "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
          done
          echo "::error::Smoke test failed after 3 attempts! ${{ inputs.health_endpoint }} returned HTTP $STATUS"
          exit 1

  preview:
    if: inputs.enable_preview && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/29391431111/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: ${{ inputs.service_account }}

      - name: Deploy preview (no traffic)
        id: preview
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ inputs.service_name }}
          region: ${{ env.REGION }}
          source: .
          flags: ${{ inputs.cloud_run_flags }} --no-traffic --tag pr-${{ github.event.number }}

      - name: Get ID Token for Preview Smoke Test
        if: ${{ !inputs.skip_smoke_test && inputs.authenticated_smoke_test }}
        id: preview_id_token
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/29391431111/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: ${{ inputs.service_account }}
          token_format: id_token
          id_token_audience: ${{ steps.preview.outputs.url }}
          id_token_include_email: true

      - name: Smoke Test (preview)
        if: ${{ !inputs.skip_smoke_test }}
        run: |
          URL="${{ steps.preview.outputs.url }}${{ inputs.health_endpoint }}"
          AUTH_HEADER=""
          if [ "${{ inputs.authenticated_smoke_test }}" = "true" ]; then
            AUTH_HEADER="-H \"Authorization: Bearer ${{ steps.preview_id_token.outputs.id_token }}\""
          fi
          for i in 1 2 3; do
            sleep 10
            STATUS=$(eval curl -s -o /dev/null -w "%{http_code}" --max-time 10 $AUTH_HEADER "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Preview smoke test passed (HTTP $STATUS)"
              exit 0
            fi
          done
          echo "::error::Preview smoke test failed after 3 attempts! returned HTTP $STATUS"
          exit 1

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed!\n\nURL: ${{ steps.preview.outputs.url }}\nTag: \`pr-${{ github.event.number }}\`\n\nThis revision receives 0% traffic. Merge to promote to production.`
            })
